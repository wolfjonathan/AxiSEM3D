name: Compile

on:
  push:
    branches: [main, master, axisem3d-*]
  pull_request:
    branches: [main, master]

jobs:
  linux-conda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.11
          environment-file: environment.yml
          activate-environment: axisem3d
          use-mamba: true
      - name: Conda info
        shell: bash -el {0}
        run: conda info
      - name: Configure
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          conda install -n axisem3d conda-forge::numdiff
          cmake -B build \
            -Dcxx=mpicxx \
            -Dhdf5=$CONDA_PREFIX \
            -Dnetcdf=$CONDA_PREFIX \
            -Dfftw=$CONDA_PREFIX \
            -Dmetis=$CONDA_PREFIX

      - name: Build
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          cmake --build build -j4

      - name: Check executable
        run: ./build/axisem3d --help

      - name: Run tests
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          cd build
          ctest -j2 --output-on-failure || touch test_has_failed
          GENERATE_REFERENCE_OUTPUT=1 ctest
          git diff >changes.diff 


      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with: 
          name: changes
          path: ./build/changes.diff
      
      - name: Check if tests failed
        run: | 
          if [ -f "./build/test_has_failed" ]; then
            exit 1
          else
            exit 0
          fi

      - name: Indent
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          ./tools/indent.sh
          # fail if git shows any changes:
          git diff --exit-code && echo "No changes after indenting." || exit 1

      - name: Check Input Documentation
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          cd examples/template_develop
          python3 gen_examples.py
          python3 gen_docs.py
          # fail if git shows any changes:
          git diff --exit-code && echo "No changes in parameters and example input files." || exit 1

      - name: test mesher
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          python -m salvus_mesh_lite.interface AxiSEM

  linux-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup
        run: |
          sudo apt-get update && \
            sudo DEBIAN_FRONTEND='noninteractive' \
            DEBCONF_NONINTERACTIVE_SEEN='true' \
            apt-get install --yes \
              build-essential \
              git \
              curl \
              python3-pip \
              cmake \
              openmpi-bin \
              libopenmpi-dev \
              libeigen3-dev \
              libboost-all-dev \
              libmetis-dev \
              netcdf-bin \
              libnetcdf-dev \
              libfftw3-dev \
              libhdf5-dev
      - name: Configure and build
        run: |
          mkdir build
          cd build
          cmake ..
          make -j 4
      - name: Check executable
        run: ./build/axisem3d --help
